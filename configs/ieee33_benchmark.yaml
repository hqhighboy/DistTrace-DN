study:
  name: ieee33_benchmark
  description: Minimal IEEE 33-bus benchmark configuration for reproducibility checks.
  version: "0.1.0"

feeder:
  name: ieee33_benchmark
  type: radial_benchmark
  voltage_class_kv: 12.66
  bus_count: 33
  line_count: 32
  source_bus: bus_01

loads:
  total_kw: 3715.0
  total_kvar: 2300.0
  load_scale: 1.0

transformers:
  - id: substation_transformer
    location: bus_01
    capacity_kva: 630

simulation:
  method: dummy_power_flow
  voltage_limits_pu:
    lower: 0.95
    upper: 1.05
  max_iterations: 20

economics:
  currency: USD
  energy_price_per_kwh: 0.10
  annual_hours: 8760
